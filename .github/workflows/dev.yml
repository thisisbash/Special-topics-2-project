name: Dev artifact-first deploy

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dev artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ARTIFACT_NAME="app-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='artifacts' \
            --exclude='book-shop/__pycache__' \
            --exclude='book-shop/**/__pycache__' \
            --exclude='book-shop/db.sqlite3' \
            -czf "artifacts/${ARTIFACT_NAME}" book-shop
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Commit artifact to dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "artifacts/${ARTIFACT_NAME}"
          git commit -m "Add dev artifact ${GITHUB_SHA::7}" || exit 0
          git push origin HEAD:dev

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image from committed artifact
        run: |
          docker build \
            -f book-shop/Dockerfile \
            --build-arg APP_ARTIFACT="artifacts/${ARTIFACT_NAME}" \
            -t "${{ vars.IMAGE_NAME }}:${IMAGE_TAG}" \
            -t "${{ vars.IMAGE_NAME }}:dev" \
            .

      - name: Push dev image
        run: |
          docker push "${{ vars.IMAGE_NAME }}:${IMAGE_TAG}"
          docker push "${{ vars.IMAGE_NAME }}:dev"

      - name: Upload deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "book-shop/deployment/deploy.sh,book-shop/deployment/dev/docker-compose.yml"
          target: "/tmp/bookshop-dev"
          overwrite: true

      - name: Deploy dev on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/bookshop/dev
            cp /tmp/bookshop-dev/book-shop/deployment/deploy.sh /opt/bookshop/deploy.sh
            cp /tmp/bookshop-dev/book-shop/deployment/dev/docker-compose.yml /opt/bookshop/dev/docker-compose.yml
            chmod +x /opt/bookshop/deploy.sh
            DEPLOY_ENV=dev \
            IMAGE_REPOSITORY="${{ vars.IMAGE_NAME }}" \
            IMAGE_TAG="${{ env.IMAGE_TAG }}" \
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
            DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}" \
            /opt/bookshop/deploy.sh
