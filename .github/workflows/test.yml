name: Test image-first deploy

on:
  push:
    branches:
      - test

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build fresh test artifact
        run: |
          set -euo pipefail
          mkdir -p /tmp/bookshop-artifacts
          ARTIFACT_NAME="app-test-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='artifacts' \
            --exclude='book-shop/__pycache__' \
            --exclude='book-shop/**/__pycache__' \
            --exclude='book-shop/db.sqlite3' \
            -czf "/tmp/bookshop-artifacts/${ARTIFACT_NAME}" book-shop
          mkdir -p ci-artifacts
          cp "/tmp/bookshop-artifacts/${ARTIFACT_NAME}" "ci-artifacts/${ARTIFACT_NAME}"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=test-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image from fresh artifact
        run: |
          docker build \
            -f book-shop/Dockerfile \
            --build-arg APP_ARTIFACT="ci-artifacts/${ARTIFACT_NAME}" \
            -t "${{ vars.IMAGE_NAME }}:${IMAGE_TAG}" \
            -t "${{ vars.IMAGE_NAME }}:test" \
            .

      - name: Push test image to Docker Hub
        run: |
          docker push "${{ vars.IMAGE_NAME }}:${IMAGE_TAG}"
          docker push "${{ vars.IMAGE_NAME }}:test"

      - name: Upload deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "book-shop/deployment/deploy.sh,book-shop/deployment/test/docker-compose.yml"
          target: "/tmp/bookshop-test"
          overwrite: true

      - name: Deploy test on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/bookshop/test
            cp /tmp/bookshop-test/book-shop/deployment/deploy.sh /opt/bookshop/deploy.sh
            cp /tmp/bookshop-test/book-shop/deployment/test/docker-compose.yml /opt/bookshop/test/docker-compose.yml
            chmod +x /opt/bookshop/deploy.sh
            DEPLOY_ENV=test \
            IMAGE_REPOSITORY="${{ vars.IMAGE_NAME }}" \
            IMAGE_TAG="${{ env.IMAGE_TAG }}" \
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
            DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}" \
            /opt/bookshop/deploy.sh
