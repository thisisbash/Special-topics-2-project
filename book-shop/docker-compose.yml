services:
  backend:
    build: .
    container_name: bookshop_django
    restart: always

    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - bookshopnet
  db:
    image: postgres:15
    container_name: bookshopDB
    restart: always

    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshopnet


volumes:
  postgres_data:

networks:
  bookshopnet:
    driver: bridge
